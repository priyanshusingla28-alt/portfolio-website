<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Your Web Studio</title>
  <style>
    body{
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f5f5f5;
      color: #111;
    }
    header{
      background: white;
      padding: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .btn{
      background: black;
      color: white;
      padding: 10px 18px;
      border-radius: 12px;
      text-decoration: none;
    }
    .hero,.cards{
      max-width: 1000px;
      margin: auto;
      padding: 40px 20px;
    }
    .hero{
      text-align: center;
    }
    .grid{
      display: grid;
      grid-template-columns: 1fr;
      gap: 20px;
    }
    .card{
      background: white;
      padding: 20px;
      border-radius: 18px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }
    @media(min-width:768px){
      .grid{
        grid-template-columns: repeat(3,1fr);
      }
    }
  </style>
</head>
<body>
  <header>
    <h2>Your Web Studio</h2>
    <a class="btn" href="#">Hire Me</a>
  </header>

  <section class="hero">
    <h1>Modern Websites for Business</h1>
    <p>Clean, fast and mobile-friendly websites.</p>
    <a class="btn" href="#">Get Started</a>
  </section>

  <section class="cards">
    <div class="grid">
      <div class="card">
        <h3>Business Website</h3>
        <p>Professional website for business.</p>
      </div>
      <div class="card">
        <h3>Portfolio</h3>
        <p>Show your work professionally.</p>
      </div>
      <div class="card">
        <h3>Landing Page</h3>
        <p>Single page promotion website.</p>
      </div>
    </div>
  </section>
</body>
</html>
