<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Influencer Collaboration Hub</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f8;
            margin: 0;
            padding: 0;
        }

        header {
            background: #111827;
            color: white;
            text-align: center;
            padding: 20px;
            font-size: 28px;
            font-weight: bold;
        }

        .container {
            max-width: 800px;
            margin: 40px auto;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        h2 {
            color: #111827;
        }

        input, textarea, button {
            width: 100%;
            padding: 12px;
            margin-top: 12px;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 16px;
        }

        button {
            background: #2563eb;
            color: white;
            border: none;
            cursor: pointer;
            font-weight: bold;
        }

        button:hover {
            background: #1d4ed8;
        }

        .offers {
            margin-top: 30px;
        }

        .offer-card {
            background: #f9fafb;
            border-left: 5px solid #2563eb;
            padding: 15px;
            margin-top: 15px;
            border-radius: 8px;
        }
    </style>
</head>
<body>

<header>
    Influencer Collaboration Hub
</header>

<div class="container">
    <h2>Send Collaboration Offer</h2>
    
    <input type="text" id="brandName" placeholder="Brand Name">
    <input type="text" id="email" placeholder="Email">
    <textarea id="message" rows="5" placeholder="Write collaboration offer..."></textarea>
    <button onclick="addOffer()">Send Offer</button>

    <div class="offers">
        <h2>Incoming Offers</h2>
        <div id="offersList"></div>
    </div>
</div>

<script>
    function addOffer() {
        let brand = document.getElementById("brandName").value;
        let email = document.getElementById("email").value;
        let message = document.getElementById("message").value;

        if (brand === "" || email === "" || message === "") {
            alert("Please fill all fields");
            return;
        }

        let offerCard = document.createElement("div");
        offerCard.className = "offer-card";
        offerCard.innerHTML = `
            <h3>${brand}</h3>
            <p><strong>Email:</strong> ${email}</p>
            <p>${message}</p>
        `;

        document.getElementById("offersList").appendChild(offerCard);

        document.getElementById("brandName").value = "";
        document.getElementById("email").value = "";
        document.getElementById("message").value = "";
    }
</script>

</body>
</html>
